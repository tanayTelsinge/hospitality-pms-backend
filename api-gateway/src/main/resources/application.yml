spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      uri: http://localhost:8888
      fail-fast: true
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**,/api/v1/tenants/**,/api/v1/users/**,/api/v1/roles/**
        - id: property-service
          uri: lb://property-service
          predicates:
            - Path=/api/v1/properties/**,/api/v1/rooms/**
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/api/v1/reservations/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/billing/**,/api/v1/invoices/**,/api/v1/payments/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/v1/reports/**,/api/v1/settlements/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080